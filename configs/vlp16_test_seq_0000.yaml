exhaust_test: false

# ModelParams
scene_type: "Kitti360"
resolution_scales: [1, 2, 4]
cam_num: 2
eval: True
t_init: 0.1
separate_scaling_t: 0.2

sequence_id: "0000"
vfov: [-15.0, 15.0]   # real VLP-16 vertical FOV (not KITTI-360's HDL-64 range)
hfov: [-90, 90]
hw: [32, 512]         # height is a judgment call -- see GSLidarPreprocess/README.md notes

# OptimizationParams
iterations: 30000

opacity_lr: 0.005

# 8GB-VRAM tuning: the OOM at ~iter 9999 lines up with scale_increase_interval
# (5000) pushing training to full resolution (scale=1) around iter 10000,
# right as Gaussian count (uncapped: base.yaml's densify_until_num_points
# defaults to 3,000,000) was still growing. The actual VRAM driver on this
# rasterizer is Gaussian count at full res, not image size or batch -- so
# cap population growth harder and prune more aggressively, rather than
# touching hw/resolution.
densify_until_iter: 15000
densify_until_num_points: 400000
densify_grad_threshold: 2e-4
thresh_opa_prune: 0.01
scale_increase_interval: 8000  # delay the full-res switch, giving densification more room to settle first
num_pts: 300000                # lower initial point count (was 1,000,000)
sh_increase_interval: 2000

lambda_v_reg: 0.01

lambda_lidar: 1e1
lambda_lidar_median: 1e1
lidar_decay: 0

only_velodyne: True
lambda_intensity: 0.05
lambda_intensity_sh: 0.05
lambda_raydrop: 0.05
lambda_smooth: 1e-3
lambda_chamfer: 1e-1
lambda_distortion: 1e-1
lambda_normal_consistency: 1e-1

test_iterations: [3000, 7000, 15000, 30000]
random_init_point: 0
dynamic: False
sky_depth: False
